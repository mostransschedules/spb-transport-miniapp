name: Update GTFS Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Пересобрать БД даже если фид не изменился'
        type: boolean
        default: false

jobs:
  check-and-build:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install duckdb==1.4.3

      - name: Enable swap
        run: |
          sudo swapon --show
          echo "✅ Swap активен: $(free -h | grep Swap)"

      - name: Build DB (force)
        if: inputs.force_rebuild == true
        id: build_force
        run: python build_db.py --force

      - name: Check and build if changed
        if: inputs.force_rebuild != true
        id: build_auto
        run: python build_db.py

      - name: Check if DB was built
        id: check_built
        run: |
          SIZE=$(stat -c%s "gtfs_spb.duckdb" 2>/dev/null || echo 0)
          if [ "$SIZE" -gt "50000000" ]; then
            echo "built=true" >> $GITHUB_OUTPUT
            echo "✅ БД: $(du -h gtfs_spb.duckdb | cut -f1)"
          else
            echo "built=false" >> $GITHUB_OUTPUT
            echo "⏭️ БД не собиралась"
          fi

      - name: Get release date
        if: steps.check_built.outputs.built == 'true'
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Delete old release
        if: steps.check_built.outputs.built == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete gtfs-latest --yes 2>/dev/null || true
          git push origin :refs/tags/gtfs-latest 2>/dev/null || true

      - name: Create GitHub Release
        if: steps.check_built.outputs.built == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DB_SIZE=$(du -h gtfs_spb.duckdb | cut -f1)
          DB_HASH=$(cat gtfs_hash.txt)
          gh release create gtfs-latest \
            gtfs_spb.duckdb \
            --title "GTFS Database — ${{ steps.date.outputs.date }}" \
            --notes "**Дата:** ${{ steps.date.outputs.date }} | **Размер:** ${DB_SIZE} | **Hash:** \`${DB_HASH:0:16}...\`" \
            --latest

      - name: Commit hash file
        if: steps.check_built.outputs.built == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gtfs_hash.txt
          git diff --staged --quiet || git commit -m "chore: update GTFS hash [${{ steps.date.outputs.date }}]"
          git push

      - name: Trigger Render deploy
        if: steps.check_built.outputs.built == 'true' && env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -s "$RENDER_DEPLOY_HOOK_URL"

      - name: Summary
        run: |
          if [ "${{ steps.check_built.outputs.built }}" = "true" ]; then
            echo "### ✅ БД обновлена" >> $GITHUB_STEP_SUMMARY
            echo "Релиз **gtfs-latest** обновлён — $(du -h gtfs_spb.duckdb | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⏭️ Обновление не требуется" >> $GITHUB_STEP_SUMMARY
            echo "GTFS-фид не изменился с прошлого запуска." >> $GITHUB_STEP_SUMMARY
          fi
